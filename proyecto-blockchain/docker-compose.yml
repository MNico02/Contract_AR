services:
  backend:
    build: ./backend
    container_name: backend_node
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules   # ✅ Mantener para evitar conflictos en backend
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - backend_net

  frontend:
    build: ./frontend
    container_name: frontend_react
    ports:
      - "5173:3000" # React en 3000, expuesto en 5173
    volumes:
      - ./frontend:/app    # ✅ Hot reload
    environment:
      - CHOKIDAR_USEPOLLING=true  # 🔄 Necesario para hot reload en Docker
    stdin_open: true
    tty: true
    networks:
      - backend_net

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - backend_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  backend_net:
